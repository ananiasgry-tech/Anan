name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Build APK
    uses: ArtemSBulgakov/buildozer-action@v1
    with:
      command: buildozer android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: predictor-apk
      path: bin/*.apk
```
